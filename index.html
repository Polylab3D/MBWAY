<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento MBWay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.25rem 1.75rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.25rem;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .phone {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-mbway {
      background: #2E7D32;
      color: #ffffff;
    }

    .btn-mbway:hover { background: #256427; }

    .toast {
      font-size: 13px;
      color: #2E7D32;
      font-weight: 500;
      margin-top: 0.85rem;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
      margin: 1.5rem 0;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      line-height: 1.8;
    }

    .hint strong { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="wb.png" alt="Wellen Barbosa Nails Designer" />
    </div>

    <p class="title">Número MBWay</p>
    <p class="phone">927 437 849</p>

    <!-- Único botão que faz as duas ações -->
    <button class="btn btn-mbway" onclick="copiarEAbrirMBWay()">
      <i class="ti ti-wallet" style="font-size:20px" aria-hidden="true"></i>
      Copiar e Abrir MB WAY
    </button>

    <p class="toast" id="toast">✓ Copiado! A abrir MB WAY...</p>

    <div class="divider"></div>
    <p class="hint">
      <strong>1.</strong> Clica no botão &nbsp;·&nbsp;
      <strong>2.</strong> No MB WAY → cola o número
    </p>
  </div>

  <script>
    // O número exato que vai ser copiado para a memória (sem espaços)
    const PHONE = '927437849';

    function copiarEAbrirMBWay() {
    const PHONE = CONFIG.mbway.phoneValue;

  // Copia número
    navigator.clipboard.writeText(PHONE).catch(() => {
    const el = document.createElement('textarea');
    el.value = PHONE;
    el.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(el);
    el.focus(); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  });

  showToast(CONFIG.text.successMessage);

  // Detecta sistema operativo
    const isAndroid = /android/i.test(navigator.userAgent);
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  setTimeout(() => {
    if (isAndroid) {
      // Intent URL específico para Android
      window.location.href = 'intent://payment#Intent;scheme=mbway;package=pt.sibs.android.mbway;end';
    } else if (isIOS) {
      window.location.href = 'mbway://';
    } else {
      window.location.href = 'https://www.mbway.pt';
    }
  }, 400);
}

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
