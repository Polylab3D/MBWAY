<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento MBWay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2.25rem 1.75rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo-wrap {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #E8F5E9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .logo-wrap svg {
      width: 40px;
      height: 40px;
    }

    .title {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .phone {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-copy {
      background: #f0f0f0;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
    }

    .btn-copy:hover { background: #e4e4e4; }

    .btn-mbway {
      background: #2E7D32;
      color: #ffffff;
    }

    .btn-mbway:hover { background: #256427; }

    .toast {
      font-size: 13px;
      color: #2E7D32;
      font-weight: 500;
      margin-top: 0.85rem;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
      margin: 1.5rem 0;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      line-height: 1.8;
    }

    .hint strong { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#2E7D32"/>
        <text x="20" y="27" text-anchor="middle" font-size="15" font-weight="700" fill="white" font-family="sans-serif">MB</text>
      </svg>
    </div>

    <p class="title">Número MBWay</p>
    <p class="phone">+351 927 437 849</p>

    <button class="btn btn-copy" onclick="copyNumber()">
      <i class="ti ti-copy" style="font-size:18px" aria-hidden="true"></i>
      Copiar número
    </button>

    <button class="btn btn-mbway" onclick="openMBWay()">
      <i class="ti ti-external-link" style="font-size:18px" aria-hidden="true"></i>
      Abrir MBWay
    </button>

    <p class="toast" id="toast">✓ Número copiado!</p>

    <div class="divider"></div>
    <p class="hint">
      <strong>1.</strong> Copia o número &nbsp;·&nbsp;
      <strong>2.</strong> Abre o MBWay &nbsp;·&nbsp;
      <strong>3.</strong> Pagamento → cola o número
    </p>
  </div>

  <script>
    const PHONE = '+351927437849';

    function copyNumber() {
      navigator.clipboard.writeText(PHONE).then(() => {
        showToast('✓ Número copiado!');
      }).catch(() => {
        showToast('Seleciona o número manualmente');
      });
    }

    function openMBWay() {
      window.location.href = 'mbway://';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
